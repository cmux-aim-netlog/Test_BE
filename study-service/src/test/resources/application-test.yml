# study-service 테스트 전용 설정
spring:
  task:
    scheduling:
      enabled: false  # 테스트 시 @Scheduled 미실행
  datasource:
    url: jdbc:h2:mem:study_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# 테스트 시 로컬 파일 저장 비활성화(필요 시 @TempDir 주입)
app:
  verification:
    photo:
      upload-dir: ${java.io.tmpdir}/study-test-uploads
  github:
    token: ""
