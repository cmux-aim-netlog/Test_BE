server:
  port: 8083

spring:
  application:
    name: study-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sample
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

# POC: 사진 인증 업로드 저장 경로 (로컬 디렉터리). 운영 시 S3/GCS 등으로 교체.
# 최소/최대 파일 수, 최대 파일 크기, 허용 확장자는 photo_verification 테이블(그룹별 규칙)에서 조회합니다.
app:
  verification:
    photo:
      upload-dir: ./uploads/verification
  # GitHub API 호출 시 사용 (선택). 미설정 시 비인증 호출(rate limit 60/h), 설정 시 Bearer 토큰 사용.
  github:
    token: ${GITHUB_TOKEN:}
