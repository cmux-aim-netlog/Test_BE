server:
  port: 8080

spring:
  application:
    name: gateway-service

  main:
    web-application-type: REACTIVE

  profiles:
    include:
      - secret

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service-public
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/login/**, /users/signup/**, /users/reissue

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**, /badges/**
          filters:
            - name: JwtAuthenticationFilter

        - id: store-service-internal
          uri: lb://STORE-SERVICE
          predicates:
            - Path=/internal/**


        - id: store-service-public
          uri: lb://STORE-SERVICE
          predicates:
            - Path=/points/**, /products/**, /notifications, /notifications/**
          filters:
            - name: JwtAuthenticationFilter

        - id: community-service
          uri: lb://COMMUNITY-SERVICE
          predicates:
            - Path=/inquiries/**,/notices/**
          filters:
            - name: JwtAuthenticationFilter

        # study-service 로그인 필수 API: /study-groups/my (공개 라우트보다 먼저 매칭되도록 위에 정의)
        - id: study-service-my
          uri: lb://STUDY-SERVICE
          predicates:
            - Path=/study-groups/my
          filters:
            - name: JwtAuthenticationFilter

        # study-service 공개 API (비로그인): GET 검색·목록, 추천, 그룹 상세만
        - id: study-service-public
          uri: lb://STUDY-SERVICE
          predicates:
            - Method=GET
            - Path=/study-groups,/study-groups/recommended,/study-groups/*

        - id: study-service
          uri: lb://STUDY-SERVICE
          predicates:
            - Path=/study-groups/**
          filters:
            - name: JwtAuthenticationFilter

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: trace
    com.checkit.gatewayservice: debug